name: Sync Upstream

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/akermu/emacs-libvterm.git
          git fetch upstream

      - name: Check for changes
        id: check
        run: |
          git checkout master
          UPSTREAM=$(git rev-parse upstream/master)
          ORIGIN=$(git rev-parse origin/master)

          if [ "$UPSTREAM" = "$ORIGIN" ]; then
            echo "No new changes in upstream. Already up-to-date."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "New changes detected in upstream."
            echo "Upstream commit: $UPSTREAM"
            echo "Origin commit: $ORIGIN"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Merge upstream/master
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git merge upstream/master --no-edit

      - name: Push to origin
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git push origin master

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.has_changes }}" = "true" ]; then
            echo "✅ Successfully synced upstream changes to your fork."
          else
            echo "⏭️ No new changes to sync. Fork is already up-to-date."
          fi
